app-id: io.github.d2phap.exifglass
runtime: org.freedesktop.Platform
runtime-version: '25.08'
sdk: org.freedesktop.Sdk
command: exifglass

finish-args:
  - --socket=x11
  - --share=ipc
  - --share=network
  - --device=dri
  - --filesystem=host
  # The bundled ExifTool (PAR::Packer/Perl) loads libcrypt.so.1 from here (see build-commands).
  - --env=LD_LIBRARY_PATH=/app/lib

modules:
  - name: exifglass
    buildsystem: simple
    build-commands:
      - install -d ${FLATPAK_DEST}/exifglass
      - cp -a ExifGlass exiftool libSkiaSharp.so libHarfBuzzSharp.so ${FLATPAK_DEST}/exifglass/
      - cp -a exiftool.LICENSE.txt ${FLATPAK_DEST}/exifglass/ 2>/dev/null || true
      - chmod +x ${FLATPAK_DEST}/exifglass/ExifGlass ${FLATPAK_DEST}/exifglass/exiftool
      # Bundled ExifTool (PAR/Perl) needs libcrypt.so.1 (crypt@XCRYPT_2.0); the runtime ships only
      # libcrypt.so.2, so bridge the SONAME in /app/lib (on the loader path; see LD_LIBRARY_PATH).
      - install -d ${FLATPAK_DEST}/lib
      - ln -sf /usr/lib/x86_64-linux-gnu/libcrypt.so.2 ${FLATPAK_DEST}/lib/libcrypt.so.1
      - install -d ${FLATPAK_DEST}/bin
      - ln -s ../exifglass/ExifGlass ${FLATPAK_DEST}/bin/exifglass
      - install -Dm644 io.github.d2phap.exifglass.desktop ${FLATPAK_DEST}/share/applications/io.github.d2phap.exifglass.desktop
      - install -Dm644 io.github.d2phap.exifglass.metainfo.xml ${FLATPAK_DEST}/share/metainfo/io.github.d2phap.exifglass.metainfo.xml
      - install -Dm644 io.github.d2phap.exifglass.svg ${FLATPAK_DEST}/share/icons/hicolor/scalable/apps/io.github.d2phap.exifglass.svg
      - install -Dm644 io.github.d2phap.exifglass.png ${FLATPAK_DEST}/share/icons/hicolor/512x512/apps/io.github.d2phap.exifglass.png
    sources:
      - type: archive
        url: https://github.com/d2phap/ExifGlass/releases/download/2.0.0/ExifGlass_2.0.0_linux_x64.tar.gz
        sha256: 8677c382f7db9661b057137c39af549328d1e13bb444e1ecdb195cda033b6a6a
        strip-components: 1
      - type: file
        path: io.github.d2phap.exifglass.desktop
      - type: file
        path: io.github.d2phap.exifglass.metainfo.xml
      - type: file
        path: io.github.d2phap.exifglass.svg
      - type: file
        path: io.github.d2phap.exifglass.png
